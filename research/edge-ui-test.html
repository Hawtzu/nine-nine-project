<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Edge UI Test — Board Fall-Off Visualization</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #ccc; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; }
h1 { color: #00E5FF; font-size: 22px; margin-bottom: 16px; }
.container { display: flex; gap: 24px; flex-wrap: wrap; }
.grid-panel { flex-shrink: 0; }
.controls { display: flex; flex-direction: column; gap: 12px; min-width: 260px; }
canvas { border: 1px solid #333; cursor: pointer; }
.section { background: #0f0f23; border: 1px solid #333; padding: 12px; border-radius: 4px; }
.section h3 { color: #00E5FF; font-size: 14px; margin-bottom: 8px; }
.btn-group { display: flex; flex-wrap: wrap; gap: 6px; }
.btn {
    padding: 8px 16px; font-size: 13px; cursor: pointer;
    border: 1px solid #444; background: #1a1a3e; color: #aaa;
    transition: all 0.15s; border-radius: 3px;
}
.btn:hover { border-color: #00E5FF; color: #fff; }
.btn.active { background: #003344; border-color: #00E5FF; color: #00E5FF; }
.arrow-btns { display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 40px 40px 40px; gap: 4px; justify-content: center; }
.arrow-btns .btn { padding: 6px; text-align: center; font-size: 16px; }
.desc { font-size: 12px; color: #888; line-height: 1.6; margin-top: 8px; }
.pos-label { font-family: monospace; font-size: 13px; color: #00E5FF; margin-top: 8px; }
</style>
</head>
<body>
<h1>Edge UI Test — Board Fall-Off Visualization</h1>
<div class="container">
    <div class="grid-panel">
        <canvas id="cv" width="700" height="700"></canvas>
    </div>
    <div class="controls">
        <div class="section">
            <h3>Edge Style</h3>
            <div class="btn-group">
                <button class="btn active" onclick="setOption('A')">A: 奈落</button>
                <button class="btn" onclick="setOption('B')">B: 警告テープ</button>
                <button class="btn" onclick="setOption('C')">C: ネオン</button>
            </div>
            <div class="desc" id="optionDesc">盤面の外を暗い奈落/宇宙空間として描画。パーティクルが下に流れ落ちる。</div>
        </div>
        <div class="section">
            <h3>Move Piece</h3>
            <div class="arrow-btns">
                <div></div>
                <button class="btn" onclick="movePlayer(-1,0)">↑</button>
                <div></div>
                <button class="btn" onclick="movePlayer(0,-1)">←</button>
                <button class="btn" onclick="movePlayer(0,0)" style="font-size:11px">●</button>
                <button class="btn" onclick="movePlayer(0,1)">→</button>
                <div></div>
                <button class="btn" onclick="movePlayer(1,0)">↓</button>
                <div></div>
            </div>
            <div class="pos-label" id="posLabel">Position: (4, 4)</div>
            <div class="desc">矢印キーでも移動可。端から外に出ると落下演出。</div>
        </div>
        <div class="section">
            <h3>Option Details</h3>
            <div class="desc">
                <b style="color:#00E5FF">A: 奈落エフェクト</b><br>
                サイバー空間に浮かぶプラットフォーム感。グラデーション＋落下パーティクル。<br><br>
                <b style="color:#FFD700">B: 警告ストライプ</b><br>
                黄黒のハザードテープ＋外向き赤矢印。誰でもわかる危険信号。<br><br>
                <b style="color:#FF0044">C: ネオン危険ボーダー</b><br>
                赤ネオングロー＋端セルパルス＋電気火花。既存テーマと統一感。
            </div>
        </div>
    </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

const CELL = 60;
const BOARD = 9;
const BOARD_PX = BOARD * CELL; // 540
const MARGIN = 80;

// Player
let pRow = 4, pCol = 4;
let fellOff = false;
let fellTimer = 0;

// Option
let currentOption = 'A';
const descriptions = {
    A: '盤面の外を暗い奈落/宇宙空間として描画。パーティクルが下に流れ落ちる。',
    B: '黄黒の警告ストライプで盤面を囲む。赤い矢印が外を示す。',
    C: '赤いネオングローが盤面を囲む。端にいると赤パルス＋電気火花。'
};

// Stones (fixed positions)
const stones = [{r:1,c:2},{r:2,c:6},{r:3,c:4},{r:5,c:1},{r:6,c:7},{r:7,c:5}];

// Particles for Option A (void)
const voidParticles = [];
for (let i = 0; i < 60; i++) {
    voidParticles.push({
        x: Math.random() * cv.width,
        y: Math.random() * cv.height,
        vy: 0.3 + Math.random() * 0.7,
        alpha: 0.1 + Math.random() * 0.3,
        size: 1 + Math.random() * 1.5,
        color: Math.random() > 0.5 ? '#00E5FF' : '#FFFFFF'
    });
}

// Spark particles for Option C
const sparks = [];
for (let i = 0; i < 20; i++) {
    sparks.push(newSpark());
}
function newSpark() {
    const side = Math.floor(Math.random() * 4);
    let x, y;
    const bx = MARGIN, by = MARGIN;
    if (side === 0) { x = bx + Math.random() * BOARD_PX; y = by; } // top
    else if (side === 1) { x = bx + Math.random() * BOARD_PX; y = by + BOARD_PX; } // bottom
    else if (side === 2) { x = bx; y = by + Math.random() * BOARD_PX; } // left
    else { x = bx + BOARD_PX; y = by + Math.random() * BOARD_PX; } // right
    return { x, y, life: 0, maxLife: 200 + Math.random() * 300, alpha: 0.5 + Math.random() * 0.5 };
}

// Hazard stripe pattern for Option B
let stripePattern = null;
function createStripePattern() {
    const size = 40;
    const oc = document.createElement('canvas');
    oc.width = size; oc.height = size;
    const octx = oc.getContext('2d');
    octx.fillStyle = '#000000';
    octx.fillRect(0, 0, size, size);
    octx.fillStyle = '#FFD700';
    octx.beginPath();
    octx.moveTo(0, size * 0.5);
    octx.lineTo(size * 0.5, 0);
    octx.lineTo(size, 0);
    octx.lineTo(0, size);
    octx.closePath();
    octx.fill();
    octx.beginPath();
    octx.moveTo(size * 0.5, size);
    octx.lineTo(size, size * 0.5);
    octx.lineTo(size, size);
    octx.closePath();
    octx.fill();
    stripePattern = ctx.createPattern(oc, 'repeat');
}

function setOption(opt) {
    currentOption = opt;
    document.getElementById('optionDesc').textContent = descriptions[opt];
    document.querySelectorAll('.btn-group .btn').forEach((b, i) => {
        b.classList.toggle('active', b.textContent.startsWith(opt));
    });
}

function movePlayer(dr, dc) {
    if (fellOff) return;
    if (dr === 0 && dc === 0) { pRow = 4; pCol = 4; updatePosLabel(); return; }
    const nr = pRow + dr, nc = pCol + dc;
    if (nr < 0 || nr >= BOARD || nc < 0 || nc >= BOARD) {
        fellOff = true;
        fellTimer = performance.now();
        pRow = nr; pCol = nc;
    } else {
        pRow = nr; pCol = nc;
    }
    updatePosLabel();
}

function updatePosLabel() {
    const label = fellOff ? `Position: (${pRow}, ${pCol}) — FELL OFF!` : `Position: (${pRow}, ${pCol})`;
    document.getElementById('posLabel').textContent = label;
    document.getElementById('posLabel').style.color = fellOff ? '#FF4444' : '#00E5FF';
}

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp') movePlayer(-1, 0);
    else if (e.key === 'ArrowDown') movePlayer(1, 0);
    else if (e.key === 'ArrowLeft') movePlayer(0, -1);
    else if (e.key === 'ArrowRight') movePlayer(0, 1);
});

// Click on board
cv.addEventListener('click', e => {
    const rect = cv.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const col = Math.floor((mx - MARGIN) / CELL);
    const row = Math.floor((my - MARGIN) / CELL);
    if (row >= 0 && row < BOARD && col >= 0 && col < BOARD && !fellOff) {
        pRow = row; pCol = col;
        updatePosLabel();
    }
});

// --- Drawing ---

function drawBoard(now) {
    for (let r = 0; r < BOARD; r++) {
        for (let c = 0; c < BOARD; c++) {
            const x = MARGIN + c * CELL;
            const y = MARGIN + r * CELL;
            // Cell bg
            const isAlt = (r + c) % 2 === 0;
            ctx.fillStyle = isAlt ? '#0A0A14' : '#0D0D1A';
            ctx.fillRect(x, y, CELL, CELL);
            // Grid line
            ctx.strokeStyle = '#1A3A4A';
            ctx.lineWidth = 1;
            ctx.strokeRect(x, y, CELL, CELL);
            // Grid glow
            const phase = ((r + c) * 0.15 + now / 4000) % 1.0;
            const glowAlpha = 0.06 + 0.10 * Math.sin(phase * Math.PI * 2);
            ctx.strokeStyle = `rgba(0, 229, 255, ${glowAlpha})`;
            ctx.strokeRect(x + 0.5, y + 0.5, CELL - 1, CELL - 1);
        }
    }
}

function drawStones() {
    for (const s of stones) {
        const cx = MARGIN + s.c * CELL + CELL / 2;
        const cy = MARGIN + s.r * CELL + CELL / 2;
        const sz = CELL * 0.35;
        ctx.save();
        ctx.fillStyle = '#2A2A3A';
        ctx.strokeStyle = '#00E5FF';
        ctx.lineWidth = 1.5;
        ctx.shadowColor = '#00E5FF';
        ctx.shadowBlur = 4;
        // Octagon
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
            const a = (Math.PI * 2 / 8) * i - Math.PI / 8;
            const px = cx + Math.cos(a) * sz;
            const py = cy + Math.sin(a) * sz;
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

function drawPlayerPiece(now) {
    if (fellOff) return;
    const cx = MARGIN + pCol * CELL + CELL / 2;
    const cy = MARGIN + pRow * CELL + CELL / 2;
    const radius = CELL / 2 - 10;
    const pulseT = (now % 2000) / 2000;
    const pulseAlpha = 0.15 + 0.15 * Math.sin(pulseT * Math.PI * 2);
    const glowR = radius + 6 + 3 * Math.sin(pulseT * Math.PI * 2);

    ctx.save();
    // Glow ring
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0, 170, 255, ${pulseAlpha})`;
    ctx.fill();
    // Body
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0, '#001833');
    grad.addColorStop(0.7, '#00AAFF');
    grad.addColorStop(1, '#00AAFF');
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = '#00AAFF';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00AAFF';
    ctx.shadowBlur = 8;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
}

// --- Edge Effects ---

function drawEdgeA(now) {
    const bx = MARGIN, by = MARGIN;
    // Gradients on all 4 sides
    // Top
    let g = ctx.createLinearGradient(0, by, 0, 0);
    g.addColorStop(0, '#0A0A14');
    g.addColorStop(1, '#000000');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, cv.width, by);
    // Bottom
    g = ctx.createLinearGradient(0, by + BOARD_PX, 0, cv.height);
    g.addColorStop(0, '#0A0A14');
    g.addColorStop(1, '#000000');
    ctx.fillStyle = g;
    ctx.fillRect(0, by + BOARD_PX, cv.width, MARGIN);
    // Left
    g = ctx.createLinearGradient(bx, 0, 0, 0);
    g.addColorStop(0, '#0A0A14');
    g.addColorStop(1, '#000000');
    ctx.fillStyle = g;
    ctx.fillRect(0, by, bx, BOARD_PX);
    // Right
    g = ctx.createLinearGradient(bx + BOARD_PX, 0, cv.width, 0);
    g.addColorStop(0, '#0A0A14');
    g.addColorStop(1, '#000000');
    ctx.fillStyle = g;
    ctx.fillRect(bx + BOARD_PX, by, MARGIN, BOARD_PX);
    // Corners (just black)
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, bx, by);
    ctx.fillRect(bx + BOARD_PX, 0, MARGIN, by);
    ctx.fillRect(0, by + BOARD_PX, bx, MARGIN);
    ctx.fillRect(bx + BOARD_PX, by + BOARD_PX, MARGIN, MARGIN);

    // Building outlines in void
    ctx.save();
    ctx.strokeStyle = 'rgba(0, 229, 255, 0.04)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
        const y = 10 + i * 9;
        ctx.beginPath();
        ctx.moveTo(10 + i * 30, y);
        ctx.lineTo(40 + i * 35, y);
        ctx.stroke();
    }
    for (let i = 0; i < 8; i++) {
        const y = by + BOARD_PX + 15 + i * 9;
        ctx.beginPath();
        ctx.moveTo(20 + i * 40, y);
        ctx.lineTo(60 + i * 30, y);
        ctx.stroke();
    }
    ctx.restore();

    // Void particles
    for (const p of voidParticles) {
        // Only draw in void area (outside board)
        const inBoard = p.x > bx && p.x < bx + BOARD_PX && p.y > by && p.y < by + BOARD_PX;
        if (inBoard) { p.y = -5; continue; }
        p.y += p.vy;
        if (p.y > cv.height + 5) {
            p.y = -5;
            p.x = Math.random() * cv.width;
        }
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function drawEdgeB() {
    if (!stripePattern) createStripePattern();
    const bx = MARGIN, by = MARGIN;

    ctx.save();
    ctx.fillStyle = stripePattern;
    // Top
    ctx.fillRect(0, 0, cv.width, by);
    // Bottom
    ctx.fillRect(0, by + BOARD_PX, cv.width, MARGIN);
    // Left
    ctx.fillRect(0, by, bx, BOARD_PX);
    // Right
    ctx.fillRect(bx + BOARD_PX, by, MARGIN, BOARD_PX);
    ctx.restore();

    // Semi-transparent overlay to darken
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(0, 0, cv.width, by);
    ctx.fillRect(0, by + BOARD_PX, cv.width, MARGIN);
    ctx.fillRect(0, by, bx, BOARD_PX);
    ctx.fillRect(bx + BOARD_PX, by, MARGIN, BOARD_PX);

    // Red arrows pointing outward
    ctx.save();
    ctx.fillStyle = '#FF4444';
    const arrowSize = 16;
    const mid = BOARD_PX / 2;
    // Top arrow (pointing up)
    drawTriangle(bx + mid, by - 40, 0, -1, arrowSize);
    // Bottom arrow (pointing down)
    drawTriangle(bx + mid, by + BOARD_PX + 40, 0, 1, arrowSize);
    // Left arrow (pointing left)
    drawTriangle(bx - 40, by + mid, -1, 0, arrowSize);
    // Right arrow (pointing right)
    drawTriangle(bx + BOARD_PX + 40, by + mid, 1, 0, arrowSize);
    ctx.restore();
}

function drawTriangle(cx, cy, dx, dy, size) {
    ctx.save();
    ctx.fillStyle = '#FF4444';
    ctx.shadowColor = '#FF4444';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    // Tip
    ctx.moveTo(cx + dx * size, cy + dy * size);
    // Base
    ctx.lineTo(cx - dy * size * 0.6 - dx * size * 0.5, cy + dx * size * 0.6 - dy * size * 0.5);
    ctx.lineTo(cx + dy * size * 0.6 - dx * size * 0.5, cy - dx * size * 0.6 - dy * size * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawEdgeC(now) {
    const bx = MARGIN, by = MARGIN;
    // Black outside
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, cv.width, by);
    ctx.fillRect(0, by + BOARD_PX, cv.width, MARGIN);
    ctx.fillRect(0, by, bx, BOARD_PX);
    ctx.fillRect(bx + BOARD_PX, by, MARGIN, BOARD_PX);
    ctx.fillRect(0, 0, bx, by);
    ctx.fillRect(bx + BOARD_PX, 0, MARGIN, by);
    ctx.fillRect(0, by + BOARD_PX, bx, MARGIN);
    ctx.fillRect(bx + BOARD_PX, by + BOARD_PX, MARGIN, MARGIN);

    // Red neon glow border - inner
    ctx.save();
    ctx.strokeStyle = '#FF0044';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#FF0044';
    ctx.shadowBlur = 20;
    ctx.strokeRect(bx, by, BOARD_PX, BOARD_PX);
    ctx.restore();

    // Outer diffuse glow
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#FF0044';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#FF0044';
    ctx.shadowBlur = 40;
    ctx.strokeRect(bx - 2, by - 2, BOARD_PX + 4, BOARD_PX + 4);
    ctx.restore();

    // Edge cell pulse when player is on edge
    if (!fellOff) {
        const onEdge = pRow === 0 || pRow === 8 || pCol === 0 || pCol === 8;
        if (onEdge) {
            const pulseAlpha = 0.1 + 0.3 * (0.5 + 0.5 * Math.sin(now / 300));
            ctx.save();
            ctx.fillStyle = `rgba(255, 0, 68, ${pulseAlpha})`;
            // Highlight edge cells on the same edge as player
            for (let i = 0; i < BOARD; i++) {
                if (pRow === 0) ctx.fillRect(bx + i * CELL, by, CELL, CELL);
                if (pRow === 8) ctx.fillRect(bx + i * CELL, by + 8 * CELL, CELL, CELL);
                if (pCol === 0) ctx.fillRect(bx, by + i * CELL, CELL, CELL);
                if (pCol === 8) ctx.fillRect(bx + 8 * CELL, by + i * CELL, CELL, CELL);
            }
            ctx.restore();
        }
    }

    // Electric sparks
    const dt = 16; // ~60fps
    for (const s of sparks) {
        s.life += dt;
        if (s.life > s.maxLife) {
            Object.assign(s, newSpark());
        }
        const t = s.life / s.maxLife;
        const alpha = t < 0.2 ? t / 0.2 : (1 - t) / 0.8;
        ctx.save();
        ctx.globalAlpha = alpha * s.alpha;
        ctx.fillStyle = t < 0.3 ? '#FFFFFF' : '#FF4444';
        ctx.shadowColor = '#FF0044';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(s.x + (Math.random() - 0.5) * 3, s.y + (Math.random() - 0.5) * 3, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

// --- Fell Off Animation ---

function drawFellOff(now) {
    if (!fellOff) return;
    const elapsed = now - fellTimer;

    // Falling piece animation
    const cx = MARGIN + pCol * CELL + CELL / 2;
    const cy = MARGIN + pRow * CELL + CELL / 2;
    const fallProgress = Math.min(1, elapsed / 600);
    const alpha = 1 - fallProgress;
    const scale = 1 - fallProgress * 0.5;
    const yOffset = fallProgress * 40;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(cx, cy + yOffset, (CELL / 2 - 10) * scale, 0, Math.PI * 2);
    ctx.fillStyle = '#00AAFF';
    ctx.fill();
    ctx.restore();

    // FELL OFF text
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 36px Arial';
    ctx.fillStyle = '#FF0044';
    ctx.shadowColor = '#FF0044';
    ctx.shadowBlur = 15;
    const textAlpha = Math.min(1, elapsed / 200);
    ctx.globalAlpha = textAlpha;
    ctx.fillText('FELL OFF!', cv.width / 2, cv.height / 2);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Reset after 1.5s
    if (elapsed > 1500) {
        fellOff = false;
        pRow = 4; pCol = 4;
        updatePosLabel();
    }
}

// --- Main Loop ---

function draw(now) {
    ctx.clearRect(0, 0, cv.width, cv.height);
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, cv.width, cv.height);

    // Edge effect (behind board)
    if (currentOption === 'A') drawEdgeA(now);
    else if (currentOption === 'B') drawEdgeB();
    else if (currentOption === 'C') drawEdgeC(now);

    // Board
    drawBoard(now);
    drawStones();

    // Edge C pulse overlay (on top of board cells)
    // Already handled in drawEdgeC

    // Player
    drawPlayerPiece(now);

    // Fell off animation
    drawFellOff(now);

    requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
