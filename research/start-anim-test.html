<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Start Animation Test — Nine-Nine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
  h1 { margin: 18px 0 8px; font-size: 22px; color: #00E5FF; text-shadow: 0 0 10px #00E5FF; }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin: 10px 0 14px; }
  .controls button { padding: 8px 18px; border: 1px solid #00E5FF; background: #0A0A1A; color: #00E5FF; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
  .controls button:hover { background: #00E5FF22; }
  .controls button.active { background: #00E5FF; color: #000; font-weight: bold; }
  .desc { color: #888; font-size: 13px; margin-bottom: 10px; text-align: center; line-height: 1.6; }
  canvas { border: 1px solid #1A3A4A; }
  .info { margin-top: 10px; color: #888; font-size: 13px; }
</style>
</head>
<body>
<h1>Grid Build — Tile Timing Comparison</h1>
<div class="controls">
  <button onclick="playAnim('gridBuildA')" id="btn-gridBuildA">A. タイル同時表示</button>
  <button onclick="playAnim('gridBuildB')" id="btn-gridBuildB">B. READY後にタイル出現</button>
</div>
<div class="desc">
  A: グリッド構築中に特殊タイルも一緒に表示される<br>
  B: グリッド→ネオン→READY→特殊タイルが光りながら出現
</div>
<canvas id="canvas" width="1200" height="800"></canvas>
<div class="info">ボタンをクリックで何度でも再生可能</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ============================================================
//  Constants — 実ゲーム(js/constants.js)と完全一致
// ============================================================
const BOARD_SIZE = 9;
const CELL_SIZE = 80;
const PANEL_WIDTH = 280;
const BOARD_WIDTH = BOARD_SIZE * CELL_SIZE;       // 720
const SCREEN_WIDTH = BOARD_WIDTH + PANEL_WIDTH * 2; // 1200
const SCREEN_HEIGHT = 800;
const BOARD_OFFSET_X = PANEL_WIDTH;               // 280
const BOARD_OFFSET_Y = 40;

// Colors — 実ゲームと一致
const COLORS = {
    BLACK: '#000000',
    WHITE: '#FFFFFF',
    GRID: '#2A1A4A',
    GRID_GLOW: '#B040FF',
    P1: '#00AAFF',
    P2: '#FF4444',
    P1_DARK: '#001833',
    P2_DARK: '#330000',
};
const CELL_BG     = '#0A0A14';
const CELL_BG_ALT = '#0D0D1A';
const P1_PANEL_BG = '#0A0A28';
const P2_PANEL_BG = '#280A0A';
const NEON = {
    COLOR: '#B040FF',
    RGB: [176, 64, 255],
    DARK_OUTSIDE: '#050510',
    SPARK_COUNT: 20
};
const STONE_COLOR  = '#2A2A3A';
const STONE_BORDER = '#B040FF';
const STONE_INNER  = '#1A1A2E';

// Special tile overlay colors
const TILE_COLORS = {
    bomb:       '#331A00',
    ice:        '#0A1E2E',
    fountain:   '#0A2A0A',
    swamp:      '#1A1400',
    warp:       '#1A0033',
    checkpoint: '#33001A',
    snow:       '#1A1A28'
};
const TILE_LABELS = {
    bomb: 'B', ice: 'I', fountain: 'F', swamp: 'W',
    warp: 'P', checkpoint: 'C', snow: 'S'
};

// Anim timings
const GRID_PULSE_SPEED = 4000;
const PULSE_SPEED = 2000;

// ============================================================
//  Player positions — 実ゲーム(js/game.js init)と一致
//  P1: (row=4, col=0) 左端中央,  P2: (row=4, col=8) 右端中央
// ============================================================
const P1_ROW = Math.floor(BOARD_SIZE / 2); // 4
const P1_COL = 0;
const P2_ROW = Math.floor(BOARD_SIZE / 2); // 4
const P2_COL = BOARD_SIZE - 1;              // 8

// ============================================================
//  Demo board generation — 実ゲーム(js/game.js setupInitialBoard)を再現
//  ・ファウンテン2個: P1側=左ゾーン(col 0-2), P2側=右ゾーン(col 6-8)
//    各プレイヤーからチェビシェフ距離 > 3
//  ・石3個: ファウンテン位置とプレイヤー周辺(1マス)を避ける
// ============================================================
let demoBoard = [];
function generateDemoBoard() {
    demoBoard = [];
    for (let r = 0; r < BOARD_SIZE; r++) {
        demoBoard[r] = [];
        for (let c = 0; c < BOARD_SIZE; c++) demoBoard[r][c] = null;
    }

    // Chebyshev distance
    function chebDist(r1, c1, r2, c2) {
        return Math.max(Math.abs(r1 - r2), Math.abs(c1 - c2));
    }

    // Place fountain for P1 side (left zone: col 0-2, dist > 3 from P1)
    const p1FountainCandidates = [];
    for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c <= 2; c++) {
            if (chebDist(r, c, P1_ROW, P1_COL) > 3) {
                p1FountainCandidates.push({ r, c });
            }
        }
    }
    const f1 = p1FountainCandidates[Math.floor(Math.random() * p1FountainCandidates.length)];
    demoBoard[f1.r][f1.c] = 'fountain';

    // Place fountain for P2 side (right zone: col 6-8, dist > 3 from P2)
    const p2FountainCandidates = [];
    for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 6; c <= 8; c++) {
            if (chebDist(r, c, P2_ROW, P2_COL) > 3) {
                p2FountainCandidates.push({ r, c });
            }
        }
    }
    const f2 = p2FountainCandidates[Math.floor(Math.random() * p2FountainCandidates.length)];
    demoBoard[f2.r][f2.c] = 'fountain';

    // Banned positions for stones: fountains + 1-cell radius around each player
    const banned = new Set();
    banned.add(`${f1.r},${f1.c}`);
    banned.add(`${f2.r},${f2.c}`);
    for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
            const r1 = P1_ROW + dr, c1 = P1_COL + dc;
            const r2 = P2_ROW + dr, c2 = P2_COL + dc;
            if (r1 >= 0 && r1 < BOARD_SIZE && c1 >= 0 && c1 < BOARD_SIZE) banned.add(`${r1},${c1}`);
            if (r2 >= 0 && r2 < BOARD_SIZE && c2 >= 0 && c2 < BOARD_SIZE) banned.add(`${r2},${c2}`);
        }
    }

    // Place 3 stones randomly avoiding banned positions
    let stones = 0;
    while (stones < 3) {
        const r = Math.floor(Math.random() * BOARD_SIZE);
        const c = Math.floor(Math.random() * BOARD_SIZE);
        if (demoBoard[r][c]) continue;
        if (banned.has(`${r},${c}`)) continue;
        demoBoard[r][c] = 'stone';
        stones++;
    }
}
generateDemoBoard();

let currentAnim = null;
let animStart = 0;
let firstTurnPlayer = 1; // ランダムで先攻決定（1 or 2）

// Border sparks (persistent particles on neon border)
let borderSparks = [];
function initBorderSparks() {
    borderSparks = [];
    for (let i = 0; i < NEON.SPARK_COUNT; i++) borderSparks.push(newBorderSpark());
}
function newBorderSpark() {
    const side = Math.floor(Math.random() * 4);
    const bx = BOARD_OFFSET_X, by = BOARD_OFFSET_Y, bw = BOARD_WIDTH;
    let x, y;
    if (side === 0)      { x = bx + Math.random() * bw; y = by; }
    else if (side === 1) { x = bx + Math.random() * bw; y = by + bw; }
    else if (side === 2) { x = bx; y = by + Math.random() * bw; }
    else                 { x = bx + bw; y = by + Math.random() * bw; }
    return { x, y, life: 0, maxLife: 200 + Math.random() * 300, alpha: 0.5 + Math.random() * 0.5 };
}
initBorderSparks();

// ============================================================
//  Easing functions
// ============================================================
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }
function easeOutBack(t) { const c1 = 1.70158; const c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); }

// ============================================================
//  Drawing helpers — 実ゲーム(js/renderer.js)の描画を忠実に再現
// ============================================================
function brighten(hex, amount) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgb(${Math.min(255, r + 255*amount)}, ${Math.min(255, g + 255*amount)}, ${Math.min(255, b + 255*amount)})`;
}

function clearScreen() {
    ctx.fillStyle = COLORS.BLACK;
    ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
}

// --- Panels (実ゲームと同じ) ---
function drawPanels() {
    ctx.fillStyle = P1_PANEL_BG;
    ctx.fillRect(0, 0, PANEL_WIDTH, SCREEN_HEIGHT);
    ctx.fillStyle = P2_PANEL_BG;
    ctx.fillRect(SCREEN_WIDTH - PANEL_WIDTH, 0, PANEL_WIDTH, SCREEN_HEIGHT);
}

// --- Player Info on panels (実ゲーム drawPlayerInfo 再現 — ネオンスタイル) ---
function drawPlayerInfo(playerNum, isCurrentTurn) {
    const isP1 = playerNum === 1;
    const panelX = isP1 ? 0 : SCREEN_WIDTH - PANEL_WIDTH;
    const baseX = panelX + 20;
    const color = isP1 ? COLORS.P1 : COLORS.P2;

    ctx.save();

    // Player label — neon glow style
    const label = isP1 ? 'Player 1' : 'Player 2';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    // Neon glow text
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 15;
    ctx.fillText(label, baseX, 55);
    // White overlay
    ctx.shadowBlur = 0;
    ctx.fillStyle = COLORS.WHITE;
    ctx.globalAlpha = 0.5;
    ctx.fillText(label, baseX, 55);
    ctx.globalAlpha = 1;
    // Neon underline
    const textWidth = ctx.measureText(label).width;
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(baseX, 72);
    ctx.lineTo(baseX + textWidth, 72);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // YOUR TURN indicator (player color)
    if (isCurrentTurn) {
        ctx.fillStyle = color;
        ctx.font = 'bold 18px Arial';
        ctx.shadowColor = color;
        ctx.shadowBlur = 10;
        ctx.fillText('YOUR TURN', baseX, 95);
        ctx.shadowBlur = 0;
    }
    ctx.textBaseline = 'alphabetic';

    // Points bar: Y=125, height=28, width=240
    const barX = baseX;
    const barY = 125;
    const barW = PANEL_WIDTH - 40;
    const barH = 28;
    const points = isP1 ? 120 : 85; // demo values
    const fillRatio = Math.min(points / 500, 1.0);

    // Bar background
    ctx.fillStyle = '#1A1A2E';
    ctx.fillRect(barX, barY, barW, barH);

    // Bar fill gradient
    if (fillRatio > 0) {
        const grad = ctx.createLinearGradient(barX, 0, barX + barW * fillRatio, 0);
        if (isP1) { grad.addColorStop(0, '#003388'); grad.addColorStop(1, '#00AAFF'); }
        else      { grad.addColorStop(0, '#881111'); grad.addColorStop(1, '#FF4444'); }
        ctx.fillStyle = grad;
        ctx.fillRect(barX, barY, barW * fillRatio, barH);
    }

    // Bar border
    ctx.strokeStyle = '#444466';
    ctx.lineWidth = 2;
    ctx.strokeRect(barX, barY, barW, barH);

    // Points text
    ctx.fillStyle = COLORS.WHITE;
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(points + ' pt', barX + barW / 2, barY + barH / 2);

    // Skill badge: Y=124, height=28
    const badgeY = 124;
    ctx.fillStyle = isP1 ? '#224488' : '#882222';
    ctx.fillRect(barX, badgeY, barW, barH);
    ctx.fillStyle = COLORS.WHITE;
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(isP1 ? '🎯 Sniper' : '💣 Bomber', barX + 8, badgeY + barH / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 12px Arial';
    ctx.fillText('Cost: 3', barX + barW - 8, badgeY + barH / 2);

    ctx.restore();
}

// --- Neon border background (実ゲーム drawNeonBorderBackground) ---
function drawNeonBorderBg(alpha = 1) {
    const bx = BOARD_OFFSET_X, by = BOARD_OFFSET_Y, bw = BOARD_WIDTH;
    ctx.save();
    ctx.globalAlpha = alpha;

    // Dark outside areas
    ctx.fillStyle = NEON.DARK_OUTSIDE;
    ctx.fillRect(0, 0, SCREEN_WIDTH, by);                          // top
    ctx.fillRect(0, by + bw, SCREEN_WIDTH, SCREEN_HEIGHT - by - bw); // bottom
    ctx.fillRect(0, by, bx, bw);                                    // left
    ctx.fillRect(bx + bw, by, SCREEN_WIDTH - bx - bw, bw);         // right

    // Inner neon stroke
    ctx.strokeStyle = NEON.COLOR;
    ctx.lineWidth = 2;
    ctx.shadowColor = NEON.COLOR;
    ctx.shadowBlur = 20;
    ctx.strokeRect(bx, by, bw, bw);

    // Outer diffuse glow
    ctx.globalAlpha = alpha * 0.3;
    ctx.lineWidth = 3;
    ctx.shadowBlur = 40;
    ctx.strokeRect(bx - 2, by - 2, bw + 4, bw + 4);

    ctx.restore();
}

// --- Side glow (実ゲーム drawNeonBorderSideGlow) ---
function drawSideGlow(alpha = 1) {
    const bx = BOARD_OFFSET_X, by = BOARD_OFFSET_Y, bw = BOARD_WIDTH;
    ctx.save();

    // Inner layer
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = NEON.COLOR;
    ctx.shadowColor = NEON.COLOR;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 25;
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx, by + bw); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx + bw, by); ctx.lineTo(bx + bw, by + bw); ctx.stroke();

    // Diffuse layer
    ctx.globalAlpha = alpha * 0.3;
    ctx.lineWidth = 3;
    ctx.shadowBlur = 45;
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx, by + bw); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx + bw, by); ctx.lineTo(bx + bw, by + bw); ctx.stroke();

    ctx.restore();
}

// --- Border sparks (実ゲーム drawBorderSparks) ---
function drawBorderSparks(now) {
    const dt = 16; // approx frame time
    for (let s of borderSparks) {
        s.life += dt;
        if (s.life >= s.maxLife) Object.assign(s, newBorderSpark());
        const t = s.life / s.maxLife;
        const fadeAlpha = t < 0.2 ? t / 0.2 : (1 - t) / 0.8;
        ctx.save();
        ctx.globalAlpha = fadeAlpha * s.alpha;
        ctx.fillStyle = t < 0.3 ? COLORS.WHITE : NEON.COLOR;
        ctx.shadowColor = NEON.COLOR;
        ctx.shadowBlur = 6;
        const jx = (Math.random() - 0.5) * 3;
        const jy = (Math.random() - 0.5) * 3;
        ctx.beginPath();
        ctx.arc(s.x + jx, s.y + jy, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

// --- Cell base (checkerboard) ---
function drawCellBase(r, c) {
    const x = BOARD_OFFSET_X + c * CELL_SIZE;
    const y = BOARD_OFFSET_Y + r * CELL_SIZE;
    ctx.fillStyle = (r + c) % 2 === 0 ? CELL_BG : CELL_BG_ALT;
    ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
}

// --- Special tile (実ゲーム drawCell のタイル部分を再現) ---
function drawSpecialTile(r, c, type, alpha = 1) {
    const x = BOARD_OFFSET_X + c * CELL_SIZE;
    const y = BOARD_OFFSET_Y + r * CELL_SIZE;
    const cx = x + CELL_SIZE / 2;
    const cy = y + CELL_SIZE / 2;

    ctx.save();
    ctx.globalAlpha = alpha;

    if (type === 'stone') {
        // Cyber octagon (実ゲーム drawCyberStone)
        const sides = 8;
        const radius = CELL_SIZE / 3;  // ≈26.67
        ctx.beginPath();
        for (let i = 0; i < sides; i++) {
            const angle = (Math.PI * 2 * i / sides) - Math.PI / 8;
            const px = cx + radius * Math.cos(angle);
            const py = cy + radius * Math.sin(angle);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();

        // Gradient fill
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
        grad.addColorStop(0, STONE_INNER);
        grad.addColorStop(1, STONE_COLOR);
        ctx.fillStyle = grad;
        ctx.fill();

        // Border
        ctx.strokeStyle = STONE_BORDER;
        ctx.lineWidth = 1.5;
        ctx.shadowColor = STONE_BORDER;
        ctx.shadowBlur = 10;
        ctx.stroke();
    } else if (TILE_COLORS[type]) {
        // Tile overlay
        ctx.fillStyle = TILE_COLORS[type];
        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);

        // Inner radial glow
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, CELL_SIZE / 2);
        grad.addColorStop(0, brighten(TILE_COLORS[type], 0.25));
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);

        // Label (since we don't load images in research)
        ctx.fillStyle = COLORS.WHITE;
        ctx.globalAlpha = alpha * 0.6;
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(TILE_LABELS[type] || '?', cx, cy);
    }

    ctx.restore();
}

// --- Grid lines with animated glow (実ゲーム drawBoard のグリッド部分) ---
function drawGridLines(now) {
    // Base grid
    ctx.save();
    ctx.strokeStyle = COLORS.GRID;
    ctx.lineWidth = 1;
    for (let i = 0; i <= BOARD_SIZE; i++) {
        const x = BOARD_OFFSET_X + i * CELL_SIZE;
        ctx.beginPath(); ctx.moveTo(x, BOARD_OFFSET_Y); ctx.lineTo(x, BOARD_OFFSET_Y + BOARD_WIDTH); ctx.stroke();
        const y = BOARD_OFFSET_Y + i * CELL_SIZE;
        ctx.beginPath(); ctx.moveTo(BOARD_OFFSET_X, y); ctx.lineTo(BOARD_OFFSET_X + BOARD_WIDTH, y); ctx.stroke();
    }
    ctx.restore();

    // Animated grid glow
    if (now) {
        ctx.save();
        for (let r = 0; r <= BOARD_SIZE; r++) {
            for (let c = 0; c <= BOARD_SIZE; c++) {
                const phase = ((r + c) * 0.15 + now / GRID_PULSE_SPEED) % 1.0;
                const glowAlpha = 0.06 + 0.10 * Math.sin(phase * Math.PI * 2);
                if (glowAlpha > 0.01) {
                    ctx.strokeStyle = `rgba(${NEON.RGB[0]},${NEON.RGB[1]},${NEON.RGB[2]},${glowAlpha})`;
                    ctx.lineWidth = 1;
                    // horizontal line
                    if (r <= BOARD_SIZE) {
                        const y = BOARD_OFFSET_Y + r * CELL_SIZE;
                        const x1 = BOARD_OFFSET_X + Math.max(0, c - 1) * CELL_SIZE;
                        const x2 = BOARD_OFFSET_X + Math.min(BOARD_SIZE, c) * CELL_SIZE;
                        ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
                    }
                    // vertical line
                    if (c <= BOARD_SIZE) {
                        const x = BOARD_OFFSET_X + c * CELL_SIZE;
                        const y1 = BOARD_OFFSET_Y + Math.max(0, r - 1) * CELL_SIZE;
                        const y2 = BOARD_OFFSET_Y + Math.min(BOARD_SIZE, r) * CELL_SIZE;
                        ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2); ctx.stroke();
                    }
                }
            }
        }
        ctx.restore();
    }
}

// --- Player piece (実ゲーム drawPlayer 再現) ---
function drawPlayer(playerNum, row, col, now, alpha = 1) {
    const color = playerNum === 1 ? COLORS.P1 : COLORS.P2;
    const darkColor = playerNum === 1 ? COLORS.P1_DARK : COLORS.P2_DARK;
    const x = BOARD_OFFSET_X + col * CELL_SIZE + CELL_SIZE / 2;
    const y = BOARD_OFFSET_Y + row * CELL_SIZE + CELL_SIZE / 2;
    const radius = CELL_SIZE / 2 - 10; // 30

    ctx.save();
    ctx.globalAlpha = alpha;

    // 1. Outer glow ring (pulsing)
    if (now) {
        const pulseT = ((now % PULSE_SPEED) / PULSE_SPEED);
        const glowRadius = radius + 6 + 3 * Math.sin(pulseT * Math.PI * 2);
        const pulseAlpha = 0.15 + 0.15 * Math.sin(pulseT * Math.PI * 2);
        ctx.fillStyle = color;
        ctx.globalAlpha = alpha * pulseAlpha;
        ctx.beginPath(); ctx.arc(x, y, glowRadius, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = alpha;
    }

    // 2. Main body gradient
    const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
    grad.addColorStop(0, darkColor);
    grad.addColorStop(0.7, color);
    grad.addColorStop(1, color);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();

    // 3. Bright ring border
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;

    // 4. Inner accent ring
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x, y, radius - 5, 0, Math.PI * 2); ctx.stroke();

    // 5. Player number text
    ctx.fillStyle = COLORS.WHITE;
    ctx.font = 'bold 22px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.fillText(playerNum, x, y);

    ctx.restore();
}

// --- Full board with tiles + grid ---
function drawFullBoard(now, withTiles = true) {
    for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
            drawCellBase(r, c);
            if (withTiles && demoBoard[r][c]) {
                drawSpecialTile(r, c, demoBoard[r][c], 1);
            }
        }
    }
    drawGridLines(now);
}

// --- Static board (no tiles, no glow) ---
function drawStaticBoard() {
    for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) drawCellBase(r, c);
    }
    drawGridLines(null);
}

// --- Active panel neon glow (実ゲーム _drawPanelNeonGlow 再現) ---
function drawPanelNeonGlow(playerNum) {
    const color = playerNum === 1 ? COLORS.P1 : COLORS.P2;
    const isP1 = playerNum === 1;
    const px = isP1 ? 0 : SCREEN_WIDTH - PANEL_WIDTH;
    const r = parseInt(color.slice(1,3), 16);
    const g = parseInt(color.slice(3,5), 16);
    const b = parseInt(color.slice(5,7), 16);

    ctx.save();

    // Radial glow overlay
    const cx = px + PANEL_WIDTH / 2;
    const cy = SCREEN_HEIGHT / 2;
    const gradR = ctx.createRadialGradient(cx, cy, 0, cx, cy, PANEL_WIDTH);
    gradR.addColorStop(0, `rgba(${r},${g},${b},0.12)`);
    gradR.addColorStop(0.6, `rgba(${r},${g},${b},0.05)`);
    gradR.addColorStop(1, `rgba(${r},${g},${b},0.02)`);
    ctx.fillStyle = gradR;
    ctx.fillRect(px, 0, PANEL_WIDTH, SCREEN_HEIGHT);

    // Neon border rectangle
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 20;
    ctx.lineWidth = 2;
    ctx.strokeRect(px + 1, 1, PANEL_WIDTH - 2, SCREEN_HEIGHT - 2);

    // Diffuse glow
    ctx.globalAlpha = 0.25;
    ctx.shadowBlur = 45;
    ctx.lineWidth = 3;
    ctx.strokeRect(px, 0, PANEL_WIDTH, SCREEN_HEIGHT);

    ctx.restore();
}

// --- Complete game view (アニメーション完了後の状態 = 実ゲームの描画順序と一致) ---
// 描画順序: clear → neonBorderBg → panels → panelGlow → sideGlow → board → borderSparks → players → playerInfo
function drawCompleteView(now) {
    clearScreen();
    drawNeonBorderBg(1);
    drawPanels();
    drawPanelNeonGlow(firstTurnPlayer);
    drawPlayerInfo(1, firstTurnPlayer === 1);
    drawPlayerInfo(2, firstTurnPlayer === 2);
    drawSideGlow(1);
    drawFullBoard(now, true);
    drawBorderSparks(now);
    drawPlayer(1, P1_ROW, P1_COL, now);
    drawPlayer(2, P2_ROW, P2_COL, now);
}

// ============================================================
//  YOUR TURN text (画面中央に表示)
// ============================================================
function drawYourTurnText(alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = COLORS.WHITE;
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = NEON.COLOR;
    ctx.shadowBlur = 20;
    ctx.fillText('YOUR TURN', SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2);
    ctx.restore();
}

// ============================================================
//  YOUR TURN → 選ばれたプレイヤーのパネルへ布のように流れる
//  firstTurnPlayer でランダムにP1/P2が決まる
// ============================================================
const CLOTH_STRIPS = 12;

function getClothFlowTarget() {
    const isP1 = firstTurnPlayer === 1;
    return {
        // YOUR TURN表示位置(Player Nラベルの下)
        x: isP1 ? 20 + 80 : (SCREEN_WIDTH - PANEL_WIDTH) + 20 + 80,
        y: 95,
        color: isP1 ? COLORS.P1 : COLORS.P2,
        panelX: isP1 ? 0 : SCREEN_WIDTH - PANEL_WIDTH,
        panelEdgeX: isP1 ? PANEL_WIDTH : SCREEN_WIDTH - PANEL_WIDTH,
        labelX: isP1 ? 20 : SCREEN_WIDTH - PANEL_WIDTH + 20,
        label: isP1 ? 'Player 1' : 'Player 2'
    };
}

function drawClothFlow(t, now) {
    // t: 0→1
    //   0-0.1: YOUR TURN テキスト中央で揺れ
    //   0.1-0.7: 布のように選ばれたプレイヤーのパネルへ流れる
    //   0.7-1.0: パネルが光り、YOUR TURNが定位置に着地

    const target = getClothFlowTarget();
    const startX = SCREEN_WIDTH / 2;
    const startY = SCREEN_HEIGHT / 2;
    const endX = target.x;
    const endY = target.y;

    ctx.save();

    if (t < 0.1) {
        // 中央で揺れる YOUR TURN
        const wobble = Math.sin(now * 0.015) * 2;
        ctx.globalAlpha = 1;
        ctx.fillStyle = COLORS.WHITE;
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = NEON.COLOR;
        ctx.shadowBlur = 20;
        ctx.fillText('YOUR TURN', startX + wobble, startY);
    }
    else if (t < 0.7) {
        const ft = (t - 0.1) / 0.6;

        // リボンストリップ
        const textWidth = 300;
        const textHeight = 48;
        const stripH = textHeight / CLOTH_STRIPS;

        for (let i = 0; i < CLOTH_STRIPS; i++) {
            const stripProgress = i / CLOTH_STRIPS;
            const delay = stripProgress * 0.3;
            const st = Math.max(0, Math.min(1, (ft - delay) / (1 - delay)));
            const easedSt = easeOutCubic(st);

            const wave = Math.sin(now * 0.01 + i * 0.8) * (1 - st) * 15;
            const sx = startX + (endX - startX) * easedSt + wave;
            const sy = startY - textHeight/2 + stripH * i + (endY - startY) * easedSt;

            const scale = 1 - easedSt * 0.6;
            const a = st < 0.8 ? 1 : (1 - (st - 0.8) / 0.2);
            const skewX = (1 - st) * (i / CLOTH_STRIPS) * 0.4 * (firstTurnPlayer === 1 ? 1 : -1);

            ctx.save();
            ctx.translate(sx, sy + stripH / 2);
            ctx.scale(scale, 1);
            ctx.transform(1, 0, skewX, 1, 0, 0);
            ctx.globalAlpha = a * (0.7 + 0.3 * (1 - stripProgress));
            ctx.beginPath();
            ctx.rect(-textWidth, -stripH / 2, textWidth * 2, stripH);
            ctx.clip();
            ctx.fillStyle = COLORS.WHITE;
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = NEON.COLOR;
            ctx.shadowBlur = 15 * (1 - st);
            ctx.fillText('YOUR TURN', 0, -(stripH * i - textHeight / 2 + stripH / 2));
            ctx.restore();
        }

        // トレイルパーティクル（プレイヤーカラーで）
        const trailCount = 10;
        for (let i = 0; i < trailCount; i++) {
            const tp = (ft + i * 0.04) % 1;
            const tx = startX + (endX - startX) * easeOutCubic(tp);
            const ty = startY + (endY - startY) * easeOutCubic(tp);
            const ta = Math.max(0, 1 - tp) * ft * 0.6;
            ctx.globalAlpha = ta;
            ctx.fillStyle = target.color;
            ctx.shadowColor = target.color;
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(tx + (Math.random()-0.5)*10, ty + (Math.random()-0.5)*10, 2 + Math.random()*2, 0, Math.PI*2);
            ctx.fill();
        }
    }
    else {
        // パネルが光り、YOUR TURN が着地
        const gt = (t - 0.7) / 0.3;

        // パネルエッジグロー
        const panelGlowAlpha = (1 - gt) * 0.6;
        ctx.globalAlpha = panelGlowAlpha;
        ctx.strokeStyle = target.color;
        ctx.shadowColor = target.color;
        ctx.shadowBlur = 30;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(target.panelEdgeX, 0);
        ctx.lineTo(target.panelEdgeX, SCREEN_HEIGHT);
        ctx.stroke();

        // 横方向グローバー
        const barWidth = PANEL_WIDTH * easeOutCubic(gt);
        const barAlpha = (1 - gt * 0.5) * 0.3;
        const r = parseInt(target.color.slice(1,3), 16);
        const g = parseInt(target.color.slice(3,5), 16);
        const b = parseInt(target.color.slice(5,7), 16);
        const barGrad = ctx.createLinearGradient(0, endY - 25, 0, endY + 25);
        barGrad.addColorStop(0, 'rgba(0,0,0,0)');
        barGrad.addColorStop(0.5, `rgba(${r},${g},${b},${barAlpha})`);
        barGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.globalAlpha = 1;
        ctx.fillStyle = barGrad;
        if (firstTurnPlayer === 1) {
            ctx.fillRect(0, endY - 25, barWidth, 50);
        } else {
            ctx.fillRect(SCREEN_WIDTH - barWidth, endY - 25, barWidth, 50);
        }

        // "YOUR TURN" テキストが定位置にフェードイン
        if (gt > 0.3) {
            const subAlpha = easeOutCubic((gt - 0.3) / 0.7);
            ctx.globalAlpha = subAlpha;
            ctx.fillStyle = target.color;
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = target.color;
            ctx.shadowBlur = 10;
            ctx.fillText('YOUR TURN', target.labelX, endY);
        }
    }

    ctx.restore();
}

// ============================================================
//  Title flash
// ============================================================
function drawTitle(alpha = 1, scale = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = NEON.COLOR;
    ctx.font = `bold ${Math.round(64 * scale)}px 'Segoe UI', Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = NEON.COLOR;
    ctx.shadowBlur = 30;
    ctx.fillText('NINE-NINE', SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2);
    ctx.shadowBlur = 0;
    ctx.fillStyle = COLORS.WHITE;
    ctx.globalAlpha = alpha * 0.7;
    ctx.fillText('NINE-NINE', SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2);
    ctx.restore();
}

// ============================================================
//  Grid Build shared phases (title → panels → grid lines)
// ============================================================
function drawGridBuildPhase123(t, withTiles) {
    clearScreen();

    // Phase 1 (0-0.15): Title flash
    if (t < 0.15) {
        const tt = t / 0.15;
        drawTitle(tt, 1 + (1 - tt) * 0.3);
        return;
    }
    // Phase 2 (0.15-0.35): Title fades, panels slide in
    if (t < 0.35) {
        const tt = (t - 0.15) / 0.2;
        drawTitle(1 - tt, 1);
        const slideP1 = -PANEL_WIDTH + PANEL_WIDTH * easeOutCubic(tt);
        const slideP2 = SCREEN_WIDTH - PANEL_WIDTH * easeOutCubic(tt);
        ctx.fillStyle = P1_PANEL_BG;
        ctx.fillRect(slideP1, 0, PANEL_WIDTH, SCREEN_HEIGHT);
        ctx.fillStyle = P2_PANEL_BG;
        ctx.fillRect(slideP2, 0, PANEL_WIDTH, SCREEN_HEIGHT);
        return;
    }
    // Phase 3 (0.35-0.7): Grid lines draw one by one
    if (t < 0.7) {
        const tt = (t - 0.35) / 0.35;
        drawPanels();

        const totalLines = (BOARD_SIZE + 1) * 2;
        const linesDrawn = Math.floor(tt * totalLines);
        const lineFrac = (tt * totalLines) % 1;

        // Fill cells revealed
        const revealedCols = Math.min(Math.floor(linesDrawn / 2), BOARD_SIZE);
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < revealedCols; c++) {
                drawCellBase(r, c);
                if (withTiles && demoBoard[r][c]) {
                    drawSpecialTile(r, c, demoBoard[r][c], 1);
                }
            }
        }

        // Grid lines with newest glow
        for (let i = 0; i < linesDrawn && i < totalLines; i++) {
            const isVertical = i % 2 === 0;
            const idx = Math.floor(i / 2);
            const isLatest = (i === linesDrawn - 1);

            ctx.save();
            if (isLatest) {
                ctx.strokeStyle = COLORS.WHITE;
                ctx.shadowColor = NEON.COLOR;
                ctx.shadowBlur = 20;
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.5 + 0.5 * (1 - lineFrac);
            } else {
                ctx.strokeStyle = COLORS.GRID;
                ctx.lineWidth = 1;
            }

            if (isVertical && idx <= BOARD_SIZE) {
                const x = BOARD_OFFSET_X + idx * CELL_SIZE;
                ctx.beginPath(); ctx.moveTo(x, BOARD_OFFSET_Y); ctx.lineTo(x, BOARD_OFFSET_Y + BOARD_WIDTH); ctx.stroke();
            } else if (!isVertical && idx <= BOARD_SIZE) {
                const y = BOARD_OFFSET_Y + idx * CELL_SIZE;
                ctx.beginPath(); ctx.moveTo(BOARD_OFFSET_X, y); ctx.lineTo(BOARD_OFFSET_X + BOARD_WIDTH, y); ctx.stroke();
            }
            ctx.restore();
        }
        return;
    }
}

// ============================================================
//  A: Grid Build — タイル同時表示
// ============================================================
function animGridBuildA(now, elapsed) {
    const duration = 4500;
    const t = Math.min(elapsed / duration, 1);

    // Phase 1-3 (0-0.5): Grid build with tiles
    if (t < 0.5) {
        drawGridBuildPhase123(t / 0.5 * 0.7, true);
        return t < 1;
    }

    // Phase 4 (0.5-0.65): Neon border activates, players appear
    if (t < 0.65) {
        const tt = (t - 0.5) / 0.15;
        clearScreen();
        drawNeonBorderBg(easeOutCubic(tt));
        drawPanels();
        drawPlayerInfo(1, false);
        drawPlayerInfo(2, false);
        drawSideGlow(easeOutCubic(tt));
        drawFullBoard(now, true);
        drawBorderSparks(now);
        if (tt > 0.3) {
            const pa = easeOutBack(Math.min((tt - 0.3) / 0.4, 1));
            drawPlayer(1, P1_ROW, P1_COL, now, pa);
            drawPlayer(2, P2_ROW, P2_COL, now, pa);
        }
        return t < 1;
    }

    // Phase 5 (0.65-0.75): YOUR TURN text appears
    if (t < 0.75) {
        const tt = (t - 0.65) / 0.1;
        clearScreen();
        drawNeonBorderBg(1);
        drawPanels();
        drawPlayerInfo(1, false);
        drawPlayerInfo(2, false);
        drawSideGlow(1);
        drawFullBoard(now, true);
        drawBorderSparks(now);
        drawPlayer(1, P1_ROW, P1_COL, now);
        drawPlayer(2, P2_ROW, P2_COL, now);
        drawYourTurnText(Math.min(tt / 0.5, 1));
        return t < 1;
    }

    // Phase 6 (0.75-1.0): YOUR TURN cloth flows to chosen player
    const ct = (t - 0.75) / 0.25;
    clearScreen();
    drawNeonBorderBg(1);
    drawPanels();
    if (ct >= 0.7) drawPanelNeonGlow(firstTurnPlayer);
    drawPlayerInfo(1, false);
    drawPlayerInfo(2, false);
    drawSideGlow(1);
    drawFullBoard(now, true);
    drawBorderSparks(now);
    drawPlayer(1, P1_ROW, P1_COL, now);
    drawPlayer(2, P2_ROW, P2_COL, now);
    drawClothFlow(ct, now);

    return t < 1;
}

// ============================================================
//  B: Grid Build — READY後にタイル出現
// ============================================================
let tileRevealOrder = [];
function buildTileRevealOrder() {
    tileRevealOrder = [];
    for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
            if (demoBoard[r][c]) tileRevealOrder.push({ r, c, type: demoBoard[r][c] });
        }
    }
    for (let i = tileRevealOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tileRevealOrder[i], tileRevealOrder[j]] = [tileRevealOrder[j], tileRevealOrder[i]];
    }
}

function animGridBuildB(now, elapsed) {
    const duration = 5500;
    const t = Math.min(elapsed / duration, 1);

    // Phase 1-3 (0-0.35): Grid build NO tiles
    if (t < 0.35) {
        drawGridBuildPhase123(t / 0.35 * 0.7, false);
        return t < 1;
    }

    // Phase 4 (0.35-0.45): Neon border
    if (t < 0.45) {
        const tt = (t - 0.35) / 0.1;
        clearScreen();
        drawNeonBorderBg(easeOutCubic(tt));
        drawPanels();
        drawPlayerInfo(1, false);
        drawPlayerInfo(2, false);
        drawSideGlow(easeOutCubic(tt));
        drawStaticBoard();
        drawGridLines(now);
        drawBorderSparks(now);
        return t < 1;
    }

    // Phase 5 (0.45-0.55): Players + YOUR TURN テキスト出現
    if (t < 0.55) {
        const tt = (t - 0.45) / 0.1;
        clearScreen();
        drawNeonBorderBg(1);
        drawPanels();
        drawPlayerInfo(1, false); // まだ両方 YOUR TURN 非表示
        drawPlayerInfo(2, false);
        drawSideGlow(1);
        drawStaticBoard();
        drawGridLines(now);
        drawBorderSparks(now);
        const pa = easeOutBack(Math.min(tt / 0.6, 1));
        drawPlayer(1, P1_ROW, P1_COL, now, pa);
        drawPlayer(2, P2_ROW, P2_COL, now, pa);
        if (tt > 0.3) drawYourTurnText(Math.min((tt - 0.3) / 0.4, 1));
        return t < 1;
    }

    // Phase 6 (0.55-0.75): Tiles reveal one by one
    if (t < 0.75) {
        const tt = (t - 0.55) / 0.2;
        clearScreen();
        drawNeonBorderBg(1);
        drawPanels();
        drawPlayerInfo(1, false); // まだ両方 YOUR TURN 非表示
        drawPlayerInfo(2, false);
        drawSideGlow(1);

        // Draw cells
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) drawCellBase(r, c);
        }

        // Reveal tiles progressively
        const totalTiles = tileRevealOrder.length;
        const tilesRevealed = Math.floor(tt * (totalTiles + 2));
        const tileFrac = (tt * (totalTiles + 2)) % 1;

        for (let i = 0; i < Math.min(tilesRevealed, totalTiles); i++) {
            const tile = tileRevealOrder[i];
            drawSpecialTile(tile.r, tile.c, tile.type, 1);
            if (i === tilesRevealed - 1 && i < totalTiles) {
                const x = BOARD_OFFSET_X + tile.c * CELL_SIZE;
                const y = BOARD_OFFSET_Y + tile.r * CELL_SIZE;
                ctx.save();
                ctx.globalAlpha = (1 - tileFrac) * 0.6;
                ctx.fillStyle = NEON.COLOR;
                ctx.shadowColor = NEON.COLOR;
                ctx.shadowBlur = 25;
                ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                ctx.restore();
            }
        }

        drawGridLines(now);
        drawBorderSparks(now);
        drawPlayer(1, P1_ROW, P1_COL, now);
        drawPlayer(2, P2_ROW, P2_COL, now);

        if (tt < 0.3) drawYourTurnText(1 - tt / 0.3);
        return t < 1;
    }

    // Phase 7 (0.75-1.0): YOUR TURN が選ばれたプレイヤーのパネルへ流れる
    const ct = (t - 0.75) / 0.25;
    // 流れている間はまだYOUR TURNはパネルに表示しない
    clearScreen();
    drawNeonBorderBg(1);
    drawPanels();
    // 布フロー最終段階(t>0.7)でパネルグロー＆YOUR TURN着地するので、
    // それ以前は両方 false にしておく
    if (ct >= 0.7) {
        drawPanelNeonGlow(firstTurnPlayer);
    }
    drawPlayerInfo(1, false);
    drawPlayerInfo(2, false);
    drawSideGlow(1);
    drawFullBoard(now, true);
    drawBorderSparks(now);
    drawPlayer(1, P1_ROW, P1_COL, now);
    drawPlayer(2, P2_ROW, P2_COL, now);
    drawClothFlow(ct, now);

    return t < 1;
}

// ============================================================
//  Playback control
// ============================================================
const anims = { gridBuildA: animGridBuildA, gridBuildB: animGridBuildB };

function playAnim(name) {
    generateDemoBoard();
    buildTileRevealOrder();
    firstTurnPlayer = Math.random() < 0.5 ? 1 : 2; // ランダムで先攻決定
    currentAnim = name;
    animStart = performance.now();
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + name).classList.add('active');
}

function render() {
    const now = performance.now();

    if (currentAnim) {
        const elapsed = now - animStart;
        const running = anims[currentAnim](now, elapsed);
        if (!running) {
            // Animation done — show complete view
            currentAnim = null;
        }
    } else {
        drawCompleteView(now);
    }

    requestAnimationFrame(render);
}

// Initial screen
clearScreen();
ctx.fillStyle = '#888';
ctx.font = '24px Arial';
ctx.textAlign = 'center';
ctx.fillText('上のボタンをクリックしてアニメーションを確認', SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2);
requestAnimationFrame(render);
</script>
